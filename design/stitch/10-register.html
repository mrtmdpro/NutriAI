<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>

<title>NutriAI - Tạo tài khoản</title>

                      "tertiary-fixed-dim": "#eabf8f",

                      "inverse-surface": "#213429",
                      "primary-container": "#86efac",
                      "on-secondary-fixed": "#092014",
                      "on-background": "#0c1f15",
                      "primary-fixed": "#8ff8b4",
                      "on-tertiary-fixed-variant": "#5e411c",

                      "surface-dim": "#c9e0cf",
                      "surface-container": "#ddf4e3",

                      "surface-variant": "#d1e8d8",
                      "secondary-container": "#cee9d6",
                      "on-primary": "#ffffff",
                      "surface-bright": "#e8ffee",
                      "on-secondary": "#ffffff",
                      "primary": "#006d3e",
                      "on-primary-fixed-variant": "#00522d",
                      "inverse-primary": "#73db9a",
                      "secondary": "#4c6455",
                      "inverse-on-surface": "#e0f6e6",
                      "secondary-fixed": "#cee9d6",
                      "on-tertiary": "#ffffff",
                      "on-error-container": "#93000a",
                      "secondary-fixed-dim": "#b2cdbb",
                      "on-surface-variant": "#3e4a40",
                      "on-error": "#ffffff",
                      "on-primary-container": "#006d3e",
                      "surface-container-low": "#e2f9e8",
                      "surface-container-high": "#d7eedd",
                      "surface-container-highest": "#d1e8d8",
                      "on-tertiary-container": "#7a5931",
                      "background": "#e8ffee",
                      "on-secondary-container": "#526a5b",
                      "error-container": "#ffdad6"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": ["Be Vietnam Pro", "sans-serif"],
                      "display": ["Be Vietnam Pro", "sans-serif"],
                      "body": ["Be Vietnam Pro", "sans-serif"],
                      "label": ["Be Vietnam Pro", "sans-serif"],
                      "mono": ["Geist Mono", "monospace"]
              }

          }
        }

<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
      </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface min-h-screen flex items-center justify-center p-6 selection:bg-primary-container">
<!-- Main Registration Card -->
<main class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl shadow-[0_32px_64px_-12px_rgba(12,31,21,0.08)] overflow-hidden">
<div class="p-8 md:p-10">
<!-- Brand Identity -->
<div class="mb-8 flex flex-col items-start">
<div class="w-12 h-12 bg-primary-container rounded-xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-2xl" data-icon="biotech">biotech</span>
</div>
<h1 class="text-2xl font-bold text-on-surface tracking-tight mb-2">Tạo tài khoản</h1>
<p class="text-on-surface/70 text-sm leading-relaxed">
                    Bắt đầu xây dựng phác đồ bổ sung dựa trên bằng chứng. 
                    <span class="block text-on-surface/40 text-xs mt-1 font-mono uppercase tracking-widest">Evidence-based Protocol initiation</span>
</p>
</div>
<!-- Social Auth -->
<div class="space-y-4">
<button class="w-full h-12 border border-outline-variant/30 hover:bg-surface-container-low transition-colors rounded-xl flex items-center justify-center gap-3 text-on-surface font-medium text-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Tiếp tục với Google
                </button>
</div>
<!-- Separator -->
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/20"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-surface-container-lowest px-4 text-on-surface/40 uppercase tracking-widest font-mono">hoặc</span>
</div>
</div>
<!-- Registration Form -->
<form action="#" class="space-y-5" method="POST">
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="text-sm font-semibold text-on-surface" for="email">Email</label>
<span class="text-[10px] font-mono text-on-surface/40 uppercase">Required</span>
</div>
<input class="w-full h-12 px-4 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-on-surface/30 transition-all font-body" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-baseline">
<label class="text-sm font-semibold text-on-surface" for="password">Mật khẩu</label>
<span class="text-[10px] font-mono text-on-surface/40 uppercase">Security</span>
</div>
<input class="w-full h-12 px-4 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary/20 text-on-surface placeholder:text-on-surface/30 transition-all font-mono" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<p class="text-[11px] text-on-surface/50 flex items-center gap-1.5 px-1">
<span class="material-symbols-outlined text-[14px]" data-icon="info">info</span>
                        Tối thiểu 8 ký tự
                    </p>
</div>
<button class="w-full h-12 bg-primary-container hover:bg-[#72e09b] active:scale-[0.98] transition-all duration-200 rounded-xl text-on-surface font-bold text-sm mt-4" type="submit">
                    Tạo tài khoản
                </button>
</form>
<!-- Terms -->
<p class="mt-6 text-[11px] text-center text-on-surface/40 leading-relaxed">
                Bằng cách đăng ký, bạn đồng ý với <a class="underline hover:text-primary" href="#">Điều khoản Dịch vụ</a> và <a class="underline hover:text-primary" href="#">Chính sách Bảo mật</a> của chúng tôi.
            </p>
<!-- Footer -->
<div class="mt-8 pt-8 border-t border-outline-variant/10 text-center">
<p class="text-sm text-on-surface/70">
                    Đã có tài khoản? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">Đăng nhập</a>
</p>
</div>
</div>
</main>
<!-- Contextual Aesthetic Background Elements (Abstract Botanical) -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none opacity-40">
<div class="absolute top-[-10%] right-[-5%] w-[40%] aspect-square bg-primary-container/30 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[35%] aspect-square bg-surface-variant/40 rounded-full blur-[100px]"></div>
</div>
</body></html>
