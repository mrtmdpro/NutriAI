<!DOCTYPE html>

<html class="light" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NutriAI - Đăng nhập</title>
<!-- Fonts: Geist Sans & Geist Mono equivalents for high-end technical feel -->

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "background": "#e8ffee",
                        "secondary-fixed": "#cee9d6",
                        "secondary-container": "#cee9d6",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#092014",
                        "outline": "#6e7a70",
                        "tertiary-fixed-dim": "#eabf8f",
                        "secondary-fixed-dim": "#b2cdbb",
                        "on-error-container": "#93000a",
                        "surface-tint": "#006d3e",
                        "primary-fixed-dim": "#73db9a",
                        "on-tertiary": "#ffffff",
                        "surface-container-high": "#d7eedd",
                        "tertiary": "#795831",
                        "surface-container-lowest": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#5e411c",
                        "on-secondary-fixed-variant": "#354c3e",
                        "on-primary-fixed-variant": "#00522d",
                        "surface-container-low": "#e2f9e8",
                        "secondary": "#4c6455",
                        "surface-container": "#ddf4e3",
                        "inverse-on-surface": "#e0f6e6",
                        "error-container": "#ffdad6",
                        "on-background": "#0c1f15",
                        "on-surface": "#0c1f15",

                        "on-tertiary-fixed": "#2b1700",
                        "surface-dim": "#c9e0cf",
                        "tertiary-container": "#ffd2a1",

                        "surface-bright": "#e8ffee",

                        "surface-variant": "#d1e8d8",
                        "surface-container-highest": "#d1e8d8",
                        "on-surface-variant": "#3e4a40",
                        "inverse-primary": "#73db9a",
                        "on-tertiary-container": "#7a5931",
                        "on-primary-container": "#006d3e",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#00210f",
                        "primary-container": "#86efac",
                        "inverse-surface": "#213429"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Be Vietnam Pro", "sans-serif"],
                        "display": ["Be Vietnam Pro", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #e8ffee; /* surface-bright */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="min-h-screen flex items-center justify-center p-6 selection:bg-primary-container selection:text-on-primary-container">
<!-- Login Container -->
<main class="w-full max-w-[440px] flex flex-col gap-8 animate-fade-in">
<!-- Top App Bar / Brand Header (Suppressed Shell logic applied: no BottomNav/SideNav for Login) -->
<div class="flex flex-col items-center gap-6">
<div class="w-16 h-16 bg-primary-container rounded-2xl flex items-center justify-center text-primary shadow-sm">
<span class="material-symbols-outlined text-4xl" data-icon="clinical_notes">clinical_notes</span>
</div>
<div class="text-center space-y-1">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface">Đăng nhập</h1>
<p class="text-sm text-on-surface-variant font-mono uppercase tracking-widest">Login / Authentication</p>
</div>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0px_12px_32px_rgba(12,31,21,0.05)] border border-outline-variant/10">
<div class="space-y-2 mb-8">
<p class="text-on-surface font-semibold text-lg leading-tight">
                    Tiếp tục theo dõi sức khoẻ của bạn cùng NutriAI.
                </p>
<p class="text-on-surface-variant text-sm font-medium">
                    Continue monitoring your health with NutriAI.
                </p>
</div>
<!-- Social Provider -->
<button class="w-full h-14 flex items-center justify-center gap-3 border border-outline-variant rounded-full text-on-surface font-semibold hover:bg-surface-container-low transition-colors duration-200 group">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.07-3.71 1.07-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.11c-.22-.67-.35-1.39-.35-2.11s.13-1.44.35-2.11V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l3.66-2.83z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.83c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span>Tiếp tục với Google</span>
</button>
<!-- Separator -->
<div class="relative flex items-center my-8">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-xs font-mono text-outline-variant uppercase tracking-widest">hoặc / or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Login Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-sm font-semibold text-on-surface">Email</label>
<span class="text-[10px] font-mono text-outline-variant uppercase">Required</span>
</div>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200" placeholder="name@clinic.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-end">
<label class="text-sm font-semibold text-on-surface">Mật khẩu</label>
<button class="text-[10px] font-mono text-primary font-bold uppercase hover:underline underline-offset-4" type="button">Quên? / Forgot?</button>
</div>
<div class="relative">
<input class="w-full h-14 px-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-all duration-200" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Technical ID / Session Info (Geist Mono usage) -->
<div class="flex items-center gap-2 px-1">
<div class="w-1.5 h-1.5 rounded-full bg-primary-fixed-dim animate-pulse"></div>
<p class="text-[10px] font-mono text-outline-variant uppercase tracking-tighter">SECURE_SESSION: CLINIC_TLS_1.3</p>
</div>
<!-- Submit Button -->
<button class="w-full h-14 bg-primary text-on-primary rounded-full font-bold text-lg hover:bg-on-primary-container transition-all duration-200 active:scale-95 shadow-lg shadow-primary/10" type="submit">
                    Đăng nhập
                </button>
</form>
</div>
<!-- Footer Navigation -->
<div class="text-center space-y-4">
<p class="text-on-surface-variant font-medium">
                Chưa có tài khoản? 
                <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Đăng ký ngay / Sign up</a>
</p>
<div class="flex justify-center gap-6 pt-4">
<a class="text-[10px] font-mono text-outline-variant uppercase tracking-widest hover:text-primary transition-colors" href="#">Privacy</a>
<a class="text-[10px] font-mono text-outline-variant uppercase tracking-widest hover:text-primary transition-colors" href="#">Terms</a>
<a class="text-[10px] font-mono text-outline-variant uppercase tracking-widest hover:text-primary transition-colors" href="#">Help</a>
</div>
</div>
</main>
<!-- Visual Soul: Tonal Layering Elements (Clinical Botanicals) -->
<div class="fixed top-12 left-12 w-64 h-64 bg-primary-container/20 rounded-full blur-[100px] -z-10"></div>
<div class="fixed bottom-12 right-12 w-80 h-80 bg-surface-container-highest/40 rounded-full blur-[120px] -z-10"></div>
<!-- Botanical Detail (Geometric pattern instead of photo) -->
<div class="fixed bottom-10 left-10 opacity-10 pointer-events-none -z-10 hidden lg:block">
<svg fill="none" height="200" viewbox="0 0 200 200" width="200" xmlns="http://www.w3.org/2000/svg">
<circle class="text-primary" cx="100" cy="100" r="80" stroke="currentColor" stroke-dasharray="4 4" stroke-width="0.5"></circle>
<path class="text-primary" d="M100 20V180M20 100H180" stroke="currentColor" stroke-width="0.5"></path>
<circle class="text-primary" cx="100" cy="100" r="40" stroke="currentColor" stroke-width="1"></circle>
</svg>
</div>
</body></html>
